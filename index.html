<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sign In - Match Charm</title>
  <style>
    body {
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(135deg, #ffd6e8, #fff1c1);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: #fff;
      padding: 32px;
      border-radius: 18px;
      width: 340px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(255, 127, 191, 0.3);
    }

    img {
      width: 130px;
      margin-bottom: 12px;
    }

    h2 {
      color: #ff4fa0;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ffc1dd;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #ff7fbf;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      background: #ff7fbf;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #ff5fa9;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    a {
      color: #ff4fa0;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="logo2.jpeg" alt="Match Charm Logo">
  <h2>Join Match Charm 💖</h2>
  <div class="subtitle">Daftar dulu yuk, biar bisa mulai cari charm favoritmu ✨</div>

  <input type="text" id="username" placeholder="Username lucu kamu 🐰">
  <input type="password" id="password" placeholder="Password rahasia 🤫">

  <button onclick="register()">Daftar Sekarang 🌸</button>

  <div class="link">
    Sudah punya akun?
    <a href="index.html">Login di sini 💕</a>
  </div>
</div>

<script>
  function register() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "" || pass === "") {
      alert("Isi dulu yaa~ jangan ada yang kosong 🥺");
      return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    alert("Yay! Akun kamu berhasil dibuat 💖");
    window.location.href = "home.html";
  }
</script>

</body>
</html>
