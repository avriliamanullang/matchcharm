<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffe6f0,#fff);
  margin:0;

header{
  text-align:center;
  padding:15px;
  font-weight:bold;
  color:#e91e63;
  font-size:20px;
}

nav {
  background: #333;
  padding: 10px;
  text-align: center;
  width: 100%;
  position: relative;
  left: 0;
  top: 0;
}

nav a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
}

nav a:hover {
  color: #ff7eb3;
}

.container{
  width:380px;
  background:#fff;
  margin:40px auto;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(233,30,99,.25);
}

h2{
  text-align:center;
  color:#e91e63;
}

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
  color:#e91e63;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #f8bbd0;
  font-size:14px;
}

button{
  width:100%;
  padding:13px;
  margin-top:20px;
  border:none;
  border-radius:30px;
  background:#e91e63;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

button:hover{
  opacity:.9;
}

.hasil{
  display:none;
  margin-top:25px;
  background:#fff0f6;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

  background:#25D366;
}

<body>

<nav>
<div class="nav-links">
  <a href="index.html">Login</a>

</div>

<header>💗 match_charm 💗</header>

<div class="container">
<h2>Form Reservasi</h2>

<form onsubmit="buatReservasi(event)">
  <label>Nama (maks. 2 orang)</label>
  <input type="text" id="nama" required placeholder="Contoh: Citra & Dafa">

  <label>Nomor HP</label>
  <input type="text" id="hp" required placeholder="08xxxxxxxxxx">

  <label>Tanggal Reservasi</label>
  <input type="date" id="tanggal" required>

  <button type="submit">Ambil Nomor Antrian</button>
</form>

<div class="hasil" id="hasil">
  <div id="info"></div>

  <a id="waLink" target="_blank">
    <button class="wa-btn">Kirim ke WhatsApp</button>
  </a>

</div>
</div>

<script>
function buatReservasi(e){
  e.preventDefault();

  const nama = document.getElementById("nama").value.trim();
  const hp = document.getElementById("hp").value.trim();
  const tanggal = document.getElementById("tanggal").value;

  if(nama.split(/,|&/).length > 2){
    alert("Maksimal 2 orang dalam 1 reservasi");
    return;
  }

  let key = "ANTRIAN_" + tanggal;
  let no = localStorage.getItem(key);
  no = no ? parseInt(no) + 1 : 1;
  localStorage.setItem(key,no);

  let kode = "MC-" + tanggal.replace(/-/g,"") + "-" + no;

  document.getElementById("info").innerHTML = `
    <b>Reservasi Berhasil</b><br><br>
    Nama: ${nama}<br>
    Nomor HP: ${hp}<br>
    Tanggal: ${tanggal}<br>
    <b>Kode:</b> ${kode}<br>
    <h2>Nomor Antrian ${no}</h2>
    <small>Klik tombol untuk kirim ke WhatsApp</small>
  `;

  document.getElementById("hasil").style.display="block";

  let pesan = `Halo, saya sudah melakukan reservasi 💗
Nama: ${nama}
No HP: ${hp}
Tanggal: ${tanggal}
Kode: ${kode}
Nomor Antrian: ${no}`; 

  let nomorTujuan = "+62 83134203494"; // GANTI

  let linkWA = `https://wa.me/${6283134203494}?text=${encodeURIComponent(pesan)}`;

  document.getElementById("waLink").href = linkWA;

  e.target.reset();
}
</script>

</body>
