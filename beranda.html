<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>match_charm - Aksesoris Manik Cantik</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* SEMUA CSS YANG KAMU SUKA + TAMBAHAN BARU */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e6 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* HEADER (SESUAI YANG KAMU SUKA) */
        .header {
            background: rgba(255, 245, 247, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff69b4;
            text-decoration: none;
            max-height: 50px;
            overflow: hidden;
        }

        .logo img {
            height: 40px;
            width: auto;
            display: block;
            background: transparent;
        }

        .logo i {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff69b4, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-atas {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        .nav-links a {
            margin: 0 12px;
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #ff69b4;
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-top: 10px;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .cart-icon {
            position: relative;
            font-size: 1.4rem;
            color: #ff69b4;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .cart-icon:hover {
            background: rgba(255, 105, 180, 0.1);
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff69b4;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .main-content {
            padding-top: 120px;
            padding-bottom: 2rem;
        }

        /* SEARCH & FILTER (SESUAI YANG KAMU SUKA) */
        .search-filter-container {
            max-width: 1200px;
            margin: 0 auto 2rem;
            padding: 0 2rem;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.2);
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 105, 180, 0.1);
        }

        .search-input-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 1rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem;
            border: 2px solid rgba(255, 105, 180, 0.2);
            border-radius: 50px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.1);
            background: white;
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #ff69b4;
            font-size: 1.2rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(255, 105, 180, 0.3);
            background: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, #ff69b4, #ffb6c1);
            color: white;
            border-color: #ff69b4;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
        }

        /* PRODUCTS GRID */
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.2);
            border: 1px solid rgba(255, 105, 180, 0.1);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 60px rgba(255, 105, 180, 0.3);
        }

        .product-image {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            height: 2.5em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff69b4;
            margin-bottom: 1rem;
        }

        .add-to-cart-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff69b4, #ffb6c1);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .add-to-cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.4);
        }

        .add-to-cart-btn.added {
            background: linear-gradient(135deg, #28a745, #20c997);
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .no-products {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
            grid-column: 1 / -1;
        }

        .no-products i {
            font-size: 4rem;
            color: #ffb6c1;
            margin-bottom: 1rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .products-container {
                grid-template-columns: 1fr;
                padding: 0 1rem;
            }

            .nav-menu {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="nav-atas">
        <div class="nav-links">
            <a href="index.html">Login</a>
            <a href="home.html">Home</a>
            <a href="beranda.html">Beranda</a>
            <a href="about.html">About</a>
            <a href="product.html">Product</a>
            <a href="reservasi.html">Reservasi</a>
            <a href="review.html">Review</a>
            </div>
    </nav>

    <header class="header-logo">
        <div class="logo">
            <img src="logo2.jpeg" alt="logo">
            <span>match_charm</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <section class="search-filter-container">
            <div class="search-section">
                <div class="search-input-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="searchInput"
                        placeholder="Cari gelang manik, cincin, bag charm...">
                </div>

                <div class="filter-tabs">
                    <button class="filter-btn active" data-category="all"><i class="fas fa-th-large"></i>Semua</button>
                    <button class="filter-btn" data-category="gelang"><i class="fas fa-gem"></i>Gelang Manik</button>
                    <button class="filter-btn" data-category="cincin"><i class="fas fa-ring"></i>Cincin Manik</button>
                    <button class="filter-btn" data-category="bag-charm"><i class="fas fa-gift"></i>Bag Charm</button>
                </div>
            </div>
        </section>

        <section class="products-grid">
            <div class="products-container" id="productsContainer"></div>
        </section>
    </main>

    <script>
        // DATA PRODUK - GANTI NAMA FILE SESUAI FOTO KAMU
        const products = [
            {
                id: 1,
                name: "Gelang Manik Bunga Sakura",
                price: 15000,
                category: "gelang",
                image: "images/gelang1.jpg",  // GANTI SESUAI FOTO KAMU
                gallery: ["images/gelang1.jpg", "images/gelang2.jpg"],
                description: "Gelang manik bunga sakura handmade dengan kristal Swarovski"
            },
            {
                id: 2,
                name: "Cincin Crystal Pink",
                price: 10000,
                category: "cincin",
                image: "images/cincin1.jpg",  // GANTI SESUAI FOTO KAMU
                gallery: ["images/cincin1.jpg"],
                description: "Cincin manik crystal pink adjustable size"
            },
            {
                id: 3,
                name: "Bag Charm Hello Kitty",
                price: 15000,
                category: "bag-charm",
                image: "images/bagcharm1.jpg",  // GANTI SESUAI FOTO KAMU
                gallery: ["images/bagcharm1.jpg"],
                description: "Bag charm premium dengan manik berkualitas tinggi"
            }
            // TAMBAH PRODUK LAINNYA DI SINI
        ];

        let cart = JSON.parse(localStorage.getItem('match_charm_cart')) || [];

        // FUNCTIONS
        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = totalItems;
        }

        function renderProducts(productsToShow = products) {
            const container = document.getElementById('productsContainer');

            if (productsToShow.length === 0) {
                container.innerHTML = `
                    <div class="no-products">
                        <i class="fas fa-search"></i>
                        <h2>Tidak ada produk</h2>
                        <p>Coba ubah pencarian atau filter</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = productsToShow.map(product => {
                const isInCart = cart.find(item => item.id === product.id);
                return `
                    <div class="product-card" onclick="viewProduct(${product.id})">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">Rp ${product.price.toLocaleString()}</div>
                        <button class="add-to-cart-btn ${isInCart ? 'added' : ''}" 
                                onclick="event.stopPropagation(); addToCart(${product.id})">
                            ${isInCart ? '✅ Di Keranjang' : '+ Keranjang'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            localStorage.setItem('match_charm_cart', JSON.stringify(cart));
            updateCartCount();
            renderProducts(); // Refresh tampilan
        }

        function viewProduct(productId) {
            const product = products.find(p => p.id === productId);
            localStorage.setItem('selectedProduct', JSON.stringify(product));
            window.open('product-detail.html', '_blank');
        }

        // EVENT LISTENERS
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const category = this.dataset.category;
                const filtered = category === 'all' ?
                    products : products.filter(p => p.category === category);
                renderProducts(filtered);
            });
        });

        document.getElementById('searchInput').addEventListener('input', function () {
            const searchTerm = this.value.toLowerCase();
            const filtered = products.filter(p =>
                p.name.toLowerCase().includes(searchTerm)
            );
            renderProducts(filtered);
        });

        document.getElementById('cartIcon').addEventListener('click', function (e) {
            e.stopPropagation();
            alert(`🛒 Keranjang: ${cart.reduce((sum, item) => sum + item.quantity, 0)} item\nTotal: Rp ${cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toLocaleString()}`);
        });

        // INIT
        updateCartCount();
        renderProducts();
    </script>
</body>

</html>
